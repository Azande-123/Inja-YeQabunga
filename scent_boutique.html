<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Boutique</title>
    <script>
        // Centralized CONFIG Object
        const CONFIG = {
            genderValues: {
                male: 'Male',
                female: 'Female',
                other: 'Other'
            },
            // Add other configuration options here
        };

        // Event delegation to handle adding items
        document.addEventListener('click', function(event) {
            if (event.target.matches('.add-to-cart')) {
                addToCart(event.target.dataset.itemId);
            }
        });

        function addToCart(itemId) {
            // Logic to add item to cart
            console.log(`Item ${CONFIG.genderValues[itemId]} added to cart!`);
        }
    </script>
</head>
<body>
    <header>
        <h1>Welcome to the Scent Boutique</h1>
    </header>

    <main>
        <section>
            <h2>Products</h2>
            <div>
                <button class="add-to-cart" data-item-id="male">Add Male Scent</button>
                <button class="add-to-cart" data-item-id="female">Add Female Scent</button>
                <button class="add-to-cart" data-item-id="other">Add Other Scent</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Scent Boutique. All rights reserved.</p>
    </footer>
</body>
</html>
